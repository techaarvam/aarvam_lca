<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Tool Calls Proxy Flow</title>
  <desc id="desc">Diagram showing agent frontends talking OpenAI tool_calls to a proxy, which bridges Qwen XML and JSON tool output from local model servers.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#355c7d"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #14324a; }
      .section { font: 700 18px Arial, sans-serif; fill: #14324a; }
      .label { font: 600 16px Arial, sans-serif; fill: #17384f; }
      .text { font: 14px Arial, sans-serif; fill: #24445b; }
      .small { font: 13px Arial, sans-serif; fill: #35556a; }
      .box { stroke: #355c7d; stroke-width: 2; rx: 18; ry: 18; }
      .soft { fill: #eef6fb; }
      .mid { fill: #d8ebf6; }
      .accent { fill: #f9f1df; stroke: #ba8b33; }
      .line { stroke: #355c7d; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #7a8f9f; stroke-width: 2; stroke-dasharray: 8 6; fill: none; }
    </style>
  </defs>

  <rect width="1200" height="520" fill="#fbfdff"/>
  <text x="600" y="42" text-anchor="middle" class="title">Tool-calls proxy for Qwen on a 12 GB Blackwell setup</text>

  <rect x="40" y="110" width="280" height="250" class="box soft"/>
  <text x="180" y="145" text-anchor="middle" class="section">Agent frontends</text>
  <rect x="78" y="170" width="204" height="42" class="box mid"/>
  <text x="180" y="196" text-anchor="middle" class="label">OpenCode</text>
  <rect x="78" y="226" width="204" height="42" class="box mid"/>
  <text x="180" y="252" text-anchor="middle" class="label">QwenCode</text>
  <rect x="78" y="282" width="204" height="42" class="box mid"/>
  <text x="180" y="308" text-anchor="middle" class="label">OpenHands</text>
  <text x="180" y="342" text-anchor="middle" class="small">Expect stable tool calling and schema fields</text>

  <rect x="410" y="90" width="380" height="290" class="box accent"/>
  <text x="600" y="125" text-anchor="middle" class="section">tool_calls_proxy.py</text>
  <text x="600" y="155" text-anchor="middle" class="text">Normalizes model output before it reaches the frontend</text>

  <rect x="450" y="185" width="300" height="44" class="box soft"/>
  <text x="600" y="212" text-anchor="middle" class="label">Bridge Qwen XML / bare JSON to OpenAI tool_calls</text>

  <rect x="450" y="242" width="300" height="44" class="box soft"/>
  <text x="600" y="269" text-anchor="middle" class="label">Patch missing required args like description</text>

  <rect x="450" y="299" width="300" height="44" class="box soft"/>
  <text x="600" y="326" text-anchor="middle" class="label">Reduce schema-mismatch back and forth</text>

  <rect x="880" y="110" width="280" height="250" class="box soft"/>
  <text x="1020" y="145" text-anchor="middle" class="section">Local model side</text>
  <rect x="918" y="170" width="204" height="42" class="box mid"/>
  <text x="1020" y="196" text-anchor="middle" class="label">Ollama</text>
  <rect x="918" y="226" width="204" height="42" class="box mid"/>
  <text x="1020" y="252" text-anchor="middle" class="label">vLLM</text>
  <rect x="918" y="282" width="204" height="42" class="box mid"/>
  <text x="1020" y="308" text-anchor="middle" class="label">Qwen 2.5 / Qwen 3</text>
  <text x="1020" y="342" text-anchor="middle" class="small">Observed outputs: XML, bare JSON, partial tool_calls</text>

  <path d="M 320 220 C 355 220, 372 220, 410 220" class="line"/>
  <text x="365" y="202" text-anchor="middle" class="text">OpenAI /v1/chat/completions</text>
  <text x="365" y="222" text-anchor="middle" class="small">tool schemas + tool_calls expectation</text>

  <path d="M 790 240 C 830 240, 845 240, 880 240" class="line"/>
  <text x="835" y="221" text-anchor="middle" class="text">Forward request to local server</text>

  <path d="M 880 300 C 842 300, 828 300, 790 300" class="dash" marker-end="url(#arrow)"/>
  <text x="835" y="320" text-anchor="middle" class="text">Return XML / JSON / partial tool_calls</text>

  <path d="M 410 330 C 372 330, 355 330, 320 330" class="dash" marker-end="url(#arrow)"/>
  <text x="365" y="350" text-anchor="middle" class="text">Return normalized OpenAI tool_calls</text>

  <rect x="305" y="415" width="590" height="64" rx="14" ry="14" fill="#edf4d8" stroke="#7d9a3b" stroke-width="2"/>
  <text x="600" y="441" text-anchor="middle" class="label">Why this matters on 12 GB VRAM</text>
  <text x="600" y="464" text-anchor="middle" class="text">When context is tight, the model has less room to self-correct schema mismatches. The proxy removes that burden.</text>
</svg>
